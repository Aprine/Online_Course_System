# Server Port Configuration (Defaults to 8080, but allows marker to override)
server.port=${SERVER_PORT:8080}

# H2 Database Configuration
# Saves data to a file in the project folder so uploads and users persist
spring.datasource.url=jdbc:h2:file:./data/course_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate / JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Multipart upload settings
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Enable H2 Console for debugging (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# H2 Console default database path - matches the datasource URL
spring.h2.console.settings.web-allow-others=false

# Spring MVC JSP View Resolver Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Teacher registration access control
app.teacher.invite-code=HKMU-TEACHER-2026
